<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copygames — Sign in</title>
<meta name="description" content="Sign in with Roblox to discover Roblox uncopylocked games on Copygames.">
<meta name="theme-color" content="#0b0b10">
<meta name="robots" content="index, follow">

<!-- Favicon: inline SVG so it works everywhere with no external file -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0b10'/%3E%3Cg transform='rotate(-12 32 32)'%3E%3Crect x='18' y='18' width='28' height='28' rx='5' fill='none' stroke='%2300e5ff' stroke-width='3'/%3E%3Crect x='27' y='27' width='10' height='10' rx='2' fill='%23ff3df0'/%3E%3C/g%3E%3C/svg%3E">

<!-- Fonts (graceful fallback in sandbox preview; full weight when deployed) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0b0b10;
    --panel:rgba(20,20,30,.72);
    --border:rgba(255,255,255,.09);
    --border-strong:rgba(255,255,255,.18);
    --fg:#f4f4f7;
    --muted:#9a9aa8;
    --accent:#00e5ff;
    --accent-2:#ff3df0;
    --roblox:#1b1b1f;
    --roblox-hi:#2a2a30;
    --danger:#ff5a6a;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);
    color:var(--fg);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* Ambient background glow + VHS feel */
  .ambient{
    position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  }
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
  .blob.a{width:480px;height:480px;left:-120px;top:-120px;background:#10243a}
  .blob.b{width:520px;height:520px;right:-160px;bottom:-160px;background:#3a1030}
  .blob.c{width:360px;height:360px;left:50%;top:60%;transform:translateX(-50%);background:#0c1a14;opacity:.5}
  .grid-lines{
    position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
  }
  .scanlines{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.02) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay;opacity:.4;
  }

  /* The login card (your "panel") */
  .stage{position:relative;z-index:2;width:100%;max-width:420px;animation:rise .6s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:22px;
    padding:38px 30px 26px;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);
    overflow:hidden;
  }
  /* edge pulse + shine sweep */
  .card::before{
    content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;
    background:linear-gradient(135deg,rgba(0,229,255,.5),rgba(255,61,240,.25),transparent 60%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:pulse 3.2s ease-in-out infinite;pointer-events:none;
  }
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
  .shine{
    position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(115deg,transparent,rgba(255,255,255,.06),transparent);
    transform:skewX(-18deg);
    animation:sweep 5.5s ease-in-out infinite;pointer-events:none;
  }
  @keyframes sweep{0%{left:-60%}55%,100%{left:140%}}

  /* Logo at the top of the card */
  .logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:8px}
  .logo-mark{
    width:78px;height:78px;border-radius:20px;
    display:grid;place-items:center;
    background:radial-gradient(120% 120% at 30% 20%,#16161f,#0c0c12);
    border:1px solid var(--border-strong);
    box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(0,229,255,.12) inset;
  }
  .wordmark{
    font-family:"Pixelify Sans",cursive;
    font-weight:700;font-size:30px;letter-spacing:1px;line-height:1;
    background:linear-gradient(90deg,#fff,#cfe9ff 60%,#9ad7ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  h1{
    font-family:"Pixelify Sans",cursive;
    font-weight:600;font-size:22px;margin:18px 0 6px;text-align:center;
  }
  .sub{color:var(--muted);font-size:14.5px;text-align:center;margin:0 0 26px;line-height:1.5}

  /* Roblox sign-in button */
  .btn{
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:11px;
    padding:14px 16px;border-radius:13px;cursor:pointer;
    font-family:"Inter",sans-serif;font-weight:600;font-size:15.5px;
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg,var(--roblox-hi),var(--roblox));
    color:#fff;text-decoration:none;
    transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;
    box-shadow:0 8px 22px rgba(0,0,0,.4);
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.08);box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{cursor:wait;opacity:.7;transform:none}
  .btn svg{width:22px;height:22px;flex:none}

  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#555;font-size:12px}
  .divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--border)}

  .status{
    margin-top:16px;text-align:center;font-size:13.5px;min-height:20px;
    color:var(--muted);
  }
  .status.error{color:var(--danger)}
  .spinner{
    width:15px;height:15px;border-radius:50%;
    border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
    display:inline-block;vertical-align:-2px;margin-right:7px;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .foot{margin-top:18px;text-align:center}
  .foot a{
    display:inline-flex;align-items:center;gap:7px;color:var(--muted);
    text-decoration:none;font-size:12.5px;border:1px solid var(--border);
    padding:7px 13px;border-radius:10px;transition:.2s;
  }
  .foot a:hover{color:var(--fg);border-color:var(--border-strong);background:rgba(255,255,255,.03)}
  .legal{margin-top:14px;font-size:11px;color:#5a5a68;text-align:center;line-height:1.5}
  .legal a{color:#7a7a88;text-decoration:underline}
</style>
</head>
<body>
  <!-- ambient background -->
  <div class="ambient" aria-hidden="true">
    <div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>
    <div class="grid-lines"></div>
  </div>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="stage">
    <section class="card">
      <div class="shine" aria-hidden="true"></div>

      <!-- ===== Logo at the top of the card ===== -->
      <div class="logo">
        <div class="logo-mark">
          <!-- Copygames icon: neon tilted block + play core -->
          <svg width="46" height="46" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <g transform="rotate(-12 32 32)">
              <rect x="15" y="15" width="34" height="34" rx="6" fill="none" stroke="#00e5ff" stroke-width="3"/>
              <rect x="26" y="26" width="12" height="12" rx="2.5" fill="#ff3df0"/>
            </g>
            <path d="M30 27 l9 5 -9 5 z" fill="#ffffff" opacity="0.9"/>
          </svg>
        </div>
        <span class="wordmark">Copygames</span>
      </div>

      <h1>Welcome back</h1>
      <p class="sub">Sign in to discover and explore the best<br>Roblox uncopylocked games.</p>

      <!-- ===== Sign in with Roblox button ===== -->
      <button id="robloxBtn" class="btn" type="button">
        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <g transform="rotate(20 16 16)">
            <rect x="7" y="7" width="18" height="18" rx="2.5" stroke="#ffffff" stroke-width="3"/>
            <rect x="18.5" y="18.5" width="5.5" height="5.5" rx="1" fill="#ffffff"/>
          </g>
        </svg>
        Sign in with Roblox
      </button>

      <div class="divider">secure OAuth 2.0</div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div class="foot">
        <a href="https://discord.gg/K9KEYXVy2E" target="_blank" rel="noopener noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3l-.3.5c1.6.4 2.9 1 4.2 1.8a13.5 13.5 0 0 0-11.4-.5c-.6.2-1.2.5-1.8.8 1.3-.8 2.7-1.4 4.2-1.8L9.9 3a19.8 19.8 0 0 0-4.9 1.4C1.9 9.3 1.1 14.1 1.5 18.8a19.9 19.9 0 0 0 6 3l.7-1c-.9-.3-1.8-.7-2.6-1.3l.6-.4a14.2 14.2 0 0 0 12.1 0l.6.4c-.8.6-1.7 1-2.6 1.3l.7 1a19.9 19.9 0 0 0 6-3c.5-5.5-.8-10.2-3.7-14.4ZM8.7 15.9c-1.2 0-2.1-1.1-2.1-2.4s.9-2.4 2.1-2.4 2.1 1.1 2.1 2.4-.9 2.4-2.1 2.4Zm6.6 0c-1.2 0-2.1-1.1-2.1-2.4s.9-2.4 2.1-2.4 2.1 1.1 2.1 2.4-.9 2.4-2.1 2.4Z"/>
          </svg>
          Need help? Join our Discord
        </a>
      </div>

      <p class="legal">
        By signing in you agree to be signed in via Roblox. We only read your public profile
        (username &amp; display name) — we never see your password.
      </p>
    </section>
  </main>

<script>
/* =========================================================================
   Roblox OAuth 2.0 — Authorization Code flow (confidential client)
   - client_id is safe to expose here (it is public).
   - client_secret is NEVER used here; the secret lives only in the serverless
     function at /api/auth/exchange.js (read from Vercel environment variables).
   ========================================================================= */
const CLIENT_ID        = "6440127511984479644";
const REDIRECT_URI     = location.origin + location.pathname; // https://copygamesss.vercel.app/
const AUTHORIZE_URL    = "https://apis.roblox.com/oauth/v1/authorize";
const SCOPE            = "openid profile";           // public profile only
const EXCHANGE_ENDPOINT= "/api/auth/exchange";       // serverless function
const HOME_PAGE        = "home.html";                // your games site (shown after login)

const btn    = document.getElementById("robloxBtn");
const status = document.getElementById("status");

function rand(len){
  const a = new Uint8Array(len);
  crypto.getRandomValues(a);
  return Array.from(a, b => b.toString(16).padStart(2,"0")).join("");
}
function setCookie(name, value, maxAge){
  document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${maxAge}; SameSite=Lax; Secure`;
}
function getCookie(name){
  const m = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
  return m ? decodeURIComponent(m[1]) : null;
}
function showError(msg){
  status.className = "status error";
  status.textContent = msg;
  btn.disabled = false;
}
function showBusy(msg, spin){
  status.className = "status";
  status.innerHTML = (spin ? '<span class="spinner"></span>' : '') + msg;
}

// --- Click: start the authorization redirect --------------------------------
btn.addEventListener("click", () => {
  btn.disabled = true;
  const state = rand(16);
  setCookie("oauth_state", state, 600); // CSRF protection (10 min)
  const url = AUTHORIZE_URL
    + "?response_type=code"
    + "&client_id="     + CLIENT_ID
    + "&redirect_uri="  + encodeURIComponent(REDIRECT_URI)
    + "&scope="         + encodeURIComponent(SCOPE)
    + "&state="         + state;
  showBusy("Redirecting to Roblox…", true);
  window.location.href = url;
});

// --- Return from Roblox: we got ?code=… -------------------------------------
async function handleCallback(){
  const params = new URLSearchParams(location.search);
  const code  = params.get("code");
  const state = params.get("state");
  const err   = params.get("error");

  if (err){
    showError("Roblox sign-in was cancelled or failed (" + err + ").");
    // tidy the URL
    history.replaceState(null, "", location.pathname);
    return;
  }
  if (!code) return; // normal visit — show the login card

  // CSRF check
  const saved = getCookie("oauth_state");
  if (!saved || saved !== state){
    showError("Security check failed (state mismatch). Please try again.");
    history.replaceState(null, "", location.pathname);
    return;
  }
  setCookie("oauth_state", "", 0); // consume

  btn.disabled = true;
  showBusy("Finishing sign-in…", true);

  try{
    const res  = await fetch(EXCHANGE_ENDPOINT, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ code, state })
    });
    const data = await res.json();
    if (!res.ok || !data.ok){
      showError("Sign-in failed: " + (data.error || "unknown error"));
      history.replaceState(null, "", location.pathname);
      return;
    }
    // store ONLY public profile for display (never tokens)
    localStorage.setItem("roblox_user", JSON.stringify(data.user));
    showBusy("Signed in as " + (data.user.name || data.user.preferred_username || "Roblox user") + " — loading…", true);
    setTimeout(() => location.replace(HOME_PAGE), 700);
  }catch(e){
    showError("Network error talking to the server. Try again.");
    history.replaceState(null, "", location.pathname);
  }
}

handleCallback();
</script>
</body>
